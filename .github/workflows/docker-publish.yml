name: docker

# ──────────────────────────────────────────────────────────────
#  自动构建 Docker 镜像并发布到 GitHub Container Registry
#  触发：
#    - push 到 main → 重建 latest + sha
#    - push 标签 v* → 重建 vX.Y.Z + latest
#    - 手动 workflow_dispatch → 调试用
# ──────────────────────────────────────────────────────────────

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# 避免并发构建互相覆盖
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # guji08233/opencode-free-gate

jobs:
  # ── 任务: 构建并推送（PR 跳过 push 步骤） ───────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多架构）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 标签策略
          tags: |
            # 默认 latest（tag 推送时始终更新）
            type=raw,value=latest
            # 完整版本号: v1.0.1
            type=semver,pattern=v{{version}}
            # 主版本: v1
            type=semver,pattern=v{{major}}
            # 标签名: v1.0.1
            type=ref,event=tag
            # 短 SHA: 5b67eaa
            type=sha,format=short
          # 容器标签（被 labels 字段消费）
          labels: |
            org.opencontainers.image.title=opencode-free-gate
            org.opencontainers.image.description=opencode.ai/zen 免费模型的反代网关
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA 自带缓存，多架构也能命中
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 不在 CI 里加载到 docker daemon（小镜像无关紧要）
          load: false
          # 镜像 provenance 和 SBOM（GHCR 友好）
          provenance: true
          sbom: true

      - name: 运行摘要
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🐳 Docker 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "镜像地址：" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "标签：" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
